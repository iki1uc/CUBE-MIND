<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>9×9 FIX INDEX</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:40px;">

<h1>9×9 FIX INDEX</h1>

<pre id="out"></pre>

<script>
const out = document.getElementById("out");
let m = [];

for(let r=0; r<9; r++){
    let row = [];
    for(let c=0; c<9; c++){
        row.push(r*10 + c);
    }
    m.push(row);
}

out.innerText = JSON.stringify(m, null, 2);
</script>

</body>
</html>
